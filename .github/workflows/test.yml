name: Test Action

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Update READMEs
        uses: ./
        with:
          base_branches: main
          path_scopes: '**'
          doc_root_depth_from_scope: 1
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          create_pr: true

