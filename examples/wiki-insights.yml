name: DocLoop — Wiki Insights & Component Docs

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

jobs:
    docs:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        concurrency:
            group: docloop-${{ github.event.pull_request.number }}
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Maintain feature insights
              if: github.event.pull_request.base.ref == 'main'
              uses: doorloop/ai-docloop@v2
              with:
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  name: server-features
                  watch: apps/server/src/features/<FEATURE_NAME>/**
                  readme: docs/wiki/insights/<FEATURE_NAME>-feature.md
                  prompt_file: docs/wiki/insights/PROMPT.md
                  detail_level: high
                  format: freeform
                  on_missing_readme: skip
                  exclude: |
                      **/*.test.ts
                      **/*.spec.ts
                      **/__tests__/**
                      **/__snapshots__/**
                      **/*.snap
                      **/*.md
                  delivery: pr
                  commit_message: 'insights(auto): maintain feature insights [skip ci]'

            - name: Maintain component READMEs
              if: github.event.pull_request.base.ref == 'main'
              uses: doorloop/ai-docloop@v2
              with:
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  name: client-components
                  watch: apps/client/src/components/<COMPONENT>/**
                  readme: apps/client/src/components/<COMPONENT>/README.md
                  prompt_file: docs/prompts/components.md
                  detail_level: medium
                  exclude: |
                      **/*.test.tsx
                      **/__tests__/**
                  delivery: direct_commit
                  commit_message: 'docs: refresh component READMEs [skip ci]'
