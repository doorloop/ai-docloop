# Basic example — flat v1 inputs, direct commit on PR merge.
#
# Copy to YOUR repository's .github/workflows/ directory (e.g. as docloop.yml).
# This file lives in `examples/` (not `.github/workflows/`) so GitHub does NOT
# auto-run it from this repo — it is documentation, not active CI.
#
# The action is published on the GitHub Marketplace as `doorloop/ai-docloop`.
# Pin to `@v1` to track the v1.x line; semantic-release moves the v1 tag on
# every minor/patch.
#
# For richer setups (per-feature mappings, custom prompt files, PR-comment
# previews) see the sibling example folders:
#
#   - examples/wiki-insights/  — <FEATURE_NAME>-feature.md docs + custom prompt
#   - examples/pr-preview/     — preview proposed README updates as a PR comment

name: Update READMEs

on:
    pull_request:
        types: [closed]

jobs:
    update-readmes:
        # Only run when the PR was actually merged (not just closed).
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Run DocLoop AI
              uses: doorloop/ai-docloop@v1
              with:
                  base_branches: main,develop
                  path_scopes: |
                      src/features/**
                      packages/**
                  doc_root_depth_from_scope: 1
                  readme_filename: README.md
                  detail_level: medium
                  openai_model: gpt-4o-mini
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  update_mode: update
                  commit_message: 'docs: update READMEs [skip ci]'
                  create_pr: false # Set to true to open a PR instead of pushing directly
