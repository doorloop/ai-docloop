# Workflow file for the wiki-insights example.
#
# Copy to YOUR repository's .github/workflows/ directory.
# All the rich behaviour (mappings, triggers, prompt) comes from
# the sibling .docloop.yml at your repo root — this workflow only
# needs to declare which events fire the action and pass the secrets.

name: Update feature insights

on:
    pull_request:
        types: [closed]

jobs:
    update-insights:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Run DocLoop AI
              uses: doorloop/ai-docloop@v1
              with:
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
