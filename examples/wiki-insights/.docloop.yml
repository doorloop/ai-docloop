# DocLoop AI config — feature insights wiki.
#
# Copy to YOUR repository's root as `.docloop.yml`.
#
# What this example demonstrates:
#   - One canonical "feature page" per feature, generated from changes in
#     either the server or the client side, regardless of where the code
#     lives. Both watch globs share the <FEATURE_NAME> capture, so changes
#     to apps/server/features/auth/** AND apps/client/features/auth/**
#     fold into the same docs/wiki/insights/auth-feature.md page.
#   - A repo-supplied prompt at docs/docloop/prompt.md as the PRIMARY
#     directive for the model. The action's built-in operational
#     boundaries (return JSON, honour should_update, etc.) are appended
#     after — you own the editorial brief, the action owns the protocol.
#   - delivery: pr — README updates land in a separate "📚 docs" PR for
#     review rather than going straight to main.

version: 1

# Repo-wide prompt. Each mapping inherits this unless it declares its own.
prompt: docs/docloop/prompt.md

defaults:
    detail_level: high
    model: gpt-4o-mini
    format: structured
    on_missing_readme: create
    exclude:
        - '**/*.test.ts'
        - '**/*.spec.ts'
        - '**/__snapshots__/**'
        - '**/*.snap'

triggers:
    pr_merged:
        enabled: true
        base_branches: ['main']
        delivery: pr
        commit_message: 'docs: update feature insights [skip ci]'

mappings:
    - name: server-features
      watch:
          - apps/server/features/<FEATURE_NAME>/**
      readme: docs/wiki/insights/<FEATURE_NAME>-feature.md

    - name: client-features
      watch:
          - apps/client/features/<FEATURE_NAME>/**
      readme: docs/wiki/insights/<FEATURE_NAME>-feature.md
