version: 1

prompt: docs/docloop/prompt.md

defaults:
    detail_level: high
    model: gpt-4o-mini
    format: freeform
    on_missing_readme: skip
    exclude:
        - '**/*.test.ts'
        - '**/*.spec.ts'
        - '**/__tests__/**'
        - '**/__snapshots__/**'
        - '**/*.snap'
        - '**/*.md'

triggers:
    pr_merged:
        enabled: true
        base_branches: ['main']
        delivery: pr
        commit_message: 'docs: update feature insights [skip ci]'

mappings:
    - name: server-features
      watch:
          - apps/server/features/<FEATURE_NAME>/**
      readme: docs/wiki/insights/<FEATURE_NAME>-feature.md

    - name: client-features
      watch:
          - apps/client/features/<FEATURE_NAME>/**
      readme: docs/wiki/insights/<FEATURE_NAME>-feature.md
