name: Maintain src/* READMEs

on:
    pull_request:
        types: [closed]
        paths-ignore:
            - '**/README.md'
            - 'CHANGELOG.md'
    workflow_dispatch:

jobs:
    docloop:
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install deps (for the formatter)
              run: bun install --frozen-lockfile

            - uses: ./
              with:
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  watch: src/<MODULE>/**
                  readme: src/<MODULE>/README.md
                  delivery: pr
                  commit_message: 'docs: update src/* READMEs [skip ci]'
                  # Run our own oxfmt over each generated README so the
                  # dogfood output passes the format:check job on the next
                  # PR that touches it.
                  format_command: bunx --bun oxfmt --ignore-path .oxfmtignore --write
