name: Code Quality

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

# Cancel in-progress runs of this workflow on the same branch when a new push lands.
# Saves CI minutes during fast iteration on PRs.
concurrency:
    group: quality-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint (oxlint)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run lint

    format:
        name: Format (oxfmt)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run format:check

    typecheck:
        name: Typecheck (tsc)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run typecheck

    knip:
        name: Dead-code (knip)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run knip

    test:
        name: Test (bun test)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun test --coverage
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              if: always()
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

    audit:
        name: Security audit (bun audit)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun audit

    build:
        name: Build (tsup)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install --frozen-lockfile
            - run: bun run build

    # Aggregate gate for branch-protection. Require this single check on `main`
    # instead of all seven above; it succeeds iff every dependency succeeded.
    quality-gate:
        name: All quality checks pass
        runs-on: ubuntu-latest
        needs: [lint, format, typecheck, knip, test, audit, build]
        if: always()
        steps:
            - name: Verify all checks succeeded
              env:
                  RESULTS: ${{ join(needs.*.result, ',') }}
              run: |
                  echo "Job results: $RESULTS"
                  if [[ "$RESULTS" == *"failure"* || "$RESULTS" == *"cancelled"* ]]; then
                      echo "::error::One or more quality checks did not pass"
                      exit 1
                  fi
                  echo "All quality checks passed"
