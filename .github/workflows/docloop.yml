name: Maintain src/* READMEs

on:
    pull_request:
        types: [closed]
        paths-ignore:
            - '**/README.md'
            - 'CHANGELOG.md'
    workflow_dispatch:

jobs:
    docloop:
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Run DocLoop AI
              uses: ./
              with:
                  base_branches: main
                  path_scopes: src/**
                  doc_root_depth_from_scope: 1
                  readme_filename: README.md
                  detail_level: medium
                  openai_model: gpt-4o-mini
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  update_mode: update
                  commit_message: 'docs: update src/* READMEs [skip ci]'
                  create_pr: true
