name: Update READMEs

on:
    pull_request:
        types: [closed]

jobs:
    update-readmes:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: doorloop/ai-docloop@v1
              with:
                  base_branches: main,develop
                  path_scopes: |
                      src/features/**
                      packages/**
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
