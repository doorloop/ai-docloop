name: Maintain src/* READMEs

on:
    pull_request:
        types: [closed]
        paths-ignore:
            - '**/README.md'
            - 'CHANGELOG.md'
    workflow_dispatch:

jobs:
    docloop:
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./
              with:
                  base_branches: main
                  path_scopes: src/**
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  commit_message: 'docs: update src/* READMEs [skip ci]'
                  create_pr: true
