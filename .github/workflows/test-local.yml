name: Test Local (for act)

on:
    pull_request:
        types: [closed]

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install and build
              run: |
                  bun install
                  bun run build

            - name: Run DocLoop AI
              uses: ./
              with:
                  base_branches: main
                  path_scopes: src/**
                  doc_root_depth_from_scope: 1
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  create_pr: false
