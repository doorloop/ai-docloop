name: 'DocLoop AI'
description: 'Maintain documentation files using AI. One step = one mapping intent. Compose more by adding more steps.'
branding:
    icon: 'book'
    color: 'blue'
inputs:
    openai_api_key:
        description: 'OpenAI API key (should come from GitHub secrets).'
        required: true
    openai_model:
        description: 'OpenAI model identifier (e.g. gpt-4o-mini, gpt-4o, gpt-4-turbo).'
        required: false
        default: 'gpt-4o-mini'
    github_token:
        description: 'GitHub token used to read PR files and to push commits / open PRs / post comments. Defaults to the workflow-provided token.'
        required: false
        default: ${{ github.token }}
    watch:
        description: 'One or more glob patterns (newline- or comma-separated) describing the source files this mapping watches. May contain `<PLACEHOLDER>` segments (e.g. `apps/server/features/<FEATURE_NAME>/**`); placeholders fan-out one step into N target READMEs.'
        required: true
    readme:
        description: 'Target documentation file path. Any `<PLACEHOLDER>` used here must be declared in `watch`.'
        required: true
    prompt_file:
        description: 'Optional path to a Markdown file used as the model''s primary directive. The action''s operational boundaries (return JSON / Markdown / how to signal "no update") are appended after.'
        required: false
    detail_level:
        description: 'Controls how detailed the generated content should be. One of: low, medium, high.'
        required: false
        default: 'medium'
    format:
        description: 'Output format. `structured` returns JSON with `should_update`/`update_reason`. `freeform` returns Markdown; the model signals "no update" with the literal `<!-- docloop:no-update -->` sentinel.'
        required: false
        default: 'structured'
    on_missing_readme:
        description: 'What to do when the target file does not exist. One of: create, skip.'
        required: false
        default: 'create'
    exclude:
        description: 'Glob patterns to exclude from the watch set (newline- or comma-separated).'
        required: false
    delivery:
        description: 'How to deliver the generated content. One of: direct_commit, pr, pr_comment, pr_branch_commit. Default is event-derived: closed+merged → direct_commit; opened/synchronize/reopened → pr_comment; workflow_dispatch → pr.'
        required: false
    commit_message:
        description: 'Commit message used when delivery is direct_commit, pr, or pr_branch_commit.'
        required: false
        default: 'docs: update [skip ci]'
    pr_title:
        description: 'Title for the docs PR opened when delivery is `pr`. Defaults to "📚 docs: update READMEs via DocLoop AI".'
        required: false
    request_review_from_pr_author:
        description: 'When delivery is `pr` and the action is triggered by a merged PR, request a review on the docs PR from the source PR author. Set to "false" to disable.'
        required: false
        default: 'true'
    name:
        description: 'Mapping name used to key PR-preview comments so multiple docloop steps in one workflow each maintain their own idempotent comment. Defaults to a value derived from `watch` and `readme`.'
        required: false
runs:
    using: 'node20'
    main: 'dist/index.js'
