name: Test Local (for act)

on:
    pull_request:
        types: [closed]

jobs:
    test:
        # This workflow is for local `act` runs only. `act` sets `env.ACT=true`,
        # so the job is a no-op on real GitHub Actions runs (the dogfood
        # workflow `docloop.yml` already covers real-GitHub end-to-end testing).
        # Without this guard the job would also run `bun run build`, which
        # rewrites `dist/index.js` (tsup output isn't byte-identical), leaving
        # the working tree dirty so the action's commit/rebase step fails.
        if: ${{ env.ACT }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install and build
              run: |
                  bun install
                  bun run build

            - name: Run DocLoop AI
              uses: ./
              with:
                  openai_api_key: ${{ secrets.OPENAI_API_KEY }}
                  watch: src/<MODULE>/**
                  readme: src/<MODULE>/README.md
                  delivery: direct_commit
